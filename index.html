<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFC Device Simulator</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --menu-bg: #2a2a2a;
            --transit-accent: #8ea604;
            --eftpos-accent: #007bff;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            overflow: hidden; 
        }

        /* --- Global App Shell & Navigation --- */
        
        .hamburger-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(40, 40, 40, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .hamburger-btn div {
            width: 24px;
            height: 3px;
            background-color: #ddd;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 260px;
            height: 100vh;
            background-color: var(--menu-bg);
            z-index: 999;
            transition: left 0.3s ease;
            box-shadow: 5px 0 15px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            padding-top: 80px;
            border-right: 1px solid #444;
        }

        .sidebar.open { left: 0; }

        .menu-title {
            color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px 20px; font-weight: bold;
        }

        .menu-item {
            padding: 15px 20px; color: #fff; font-size: 1.1rem; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 15px; -webkit-tap-highlight-color: transparent;
        }

        .menu-item:hover, .menu-item:active { background-color: #3a3a3a; }
        .menu-item.active { border-left: 4px solid #fff; background-color: #333; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); z-index: 998; display: none; opacity: 0; transition: opacity 0.3s;
        }
        .overlay.show { display: block; opacity: 1; }

        .device-container {
            display: none; flex-direction: column; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; animation: fadeIn 0.4s ease;
        }
        .device-container.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- DEVICE 1: Transit Terminal --- */
        .terminal-casing {
            background: linear-gradient(135deg, #3a3a3a, #222); border-radius: 20px; padding: 25px; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.1), inset 0 -5px 15px rgba(0,0,0,0.5); border: 2px solid #444; display: flex; flex-direction: column; align-items: center; gap: 20px; box-sizing: border-box;
        }
        .led-panel { display: flex; gap: 20px; padding: 10px 20px; background-color: #111; border-radius: 30px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        .led { width: 24px; height: 24px; border-radius: 50%; background-color: #333; box-shadow: inset 0 2px 5px rgba(0,0,0,0.6), 0 1px 1px rgba(255,255,255,0.1); transition: all 0.1s ease; }
        .led.red.on { background-color: #ff3333; box-shadow: 0 0 15px #ff3333, inset 0 2px 5px rgba(255,255,255,0.4); }
        .led.yellow.on { background-color: #ffcc00; box-shadow: 0 0 15px #ffcc00, inset 0 2px 5px rgba(255,255,255,0.4); }
        .led.green.on { background-color: #33ff33; box-shadow: 0 0 15px #33ff33, inset 0 2px 5px rgba(255,255,255,0.4); }

        .lcd-bezel { background-color: #111; padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8); }
        .lcd-screen { background-color: var(--transit-accent); height: 70px; border-radius: 4px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; padding: 10px; position: relative; overflow: hidden; }
        #transit-lcd-text { font-family: 'Courier New', Courier, monospace; font-size: 1.1rem; font-weight: bold; color: #2e3309; text-align: center; text-transform: uppercase; line-height: 1.4; letter-spacing: 1px; width: 100%; word-wrap: break-word; text-shadow: 1px 1px 0px rgba(142, 166, 4, 0.5); }
        .lcd-screen::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.05), rgba(0, 0, 0, 0.05) 2px, transparent 2px, transparent 4px); pointer-events: none; }

        .component-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .pad-label { color: #777; font-size: 0.8rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .scan-pad { width: 160px; height: 160px; background: #2a2a2a; border-radius: 20px; border: 2px solid #555; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 5px 10px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .scan-pad:active { transform: scale(0.97); background: #222; }
        .js-logo { font-family: 'Arial Black', Impact, sans-serif; font-size: 3.5rem; font-style: italic; color: #444; letter-spacing: -2px; transform: skewX(-10deg); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); transition: all 0.3s; }
        .scan-pad.active .js-logo { color: #666; filter: drop-shadow(0 0 8px rgba(0, 155, 72, 0.6)); }

        .hardware-divider { width: 80%; height: 2px; background: #222; border-bottom: 1px solid #444; margin: 2px 0; }

        .barcode-window { width: 260px; height: 130px; background: #111; border-radius: 12px; border: 2px solid #444; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8); position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .barcode-btn { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(42, 42, 42, 0.9); color: #888; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 1rem; border: none; cursor: pointer; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; line-height: 1.5; }
        #reader { width: 100%; height: 100%; display: none; }
        #reader video { width: 100% !important; height: 100% !important; object-fit: cover !important; }
        #reader__dashboard_section_csr, #reader__dashboard_section_swaplink { display: none !important; }
        .stop-barcode-btn { position: absolute; top: 8px; right: 8px; width: 32px; height: 32px; background: rgba(30, 30, 30, 0.6); backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 50%; color: #ccc; cursor: pointer; z-index: 20; display: none; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2); -webkit-tap-highlight-color: transparent; }
        .stop-barcode-btn svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }


        /* --- DEVICE 2: EFTPOS Payment Terminal --- */
        .eftpos-casing {
            background: linear-gradient(180deg, #111, #2a2a2a); border-radius: 15px 15px 30px 30px; padding: 20px 15px 35px 15px; width: 280px; box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 2px 3px rgba(255,255,255,0.15), inset -2px -5px 10px rgba(0,0,0,0.8); border: 1px solid #333; display: flex; flex-direction: column; align-items: center; gap: 15px; box-sizing: border-box;
        }
        .eftpos-nfc-indicator { width: 100%; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .contactless-icon { width: 40px; height: 40px; fill: none; stroke: #555; stroke-width: 6; stroke-linecap: round; transition: all 0.3s; }
        .eftpos-casing.scanning .contactless-icon { stroke: #00ff88; filter: drop-shadow(0 0 5px rgba(0,255,136,0.6)); }

        .eftpos-screen-bezel { background-color: #000; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        .eftpos-screen { background: linear-gradient(135deg, #e0f2fe, #bae6fd); height: 110px; border-radius: 4px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; text-align: center; font-family: Arial, sans-serif; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .eftpos-amount { font-size: 2.2rem; font-weight: bold; color: #1e293b; margin-bottom: 5px; min-height: 40px; }
        .eftpos-status { font-size: 0.85rem; color: #334155; font-weight: bold; text-transform: uppercase; }

        .eftpos-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding: 0 10px; box-sizing: border-box; }
        .key-btn { background: linear-gradient(180deg, #444, #222); border: 1px solid #111; border-top: 1px solid #555; border-radius: 6px; height: 45px; color: #fff; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.6); -webkit-tap-highlight-color: transparent; font-family: sans-serif; user-select: none; }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.8); background: #222; }
        
        .key-cancel { background: linear-gradient(180deg, #dc2626, #991b1b); border-top: 1px solid #ef4444; }
        .key-clear { background: linear-gradient(180deg, #eab308, #a16207); border-top: 1px solid #fde047; }
        .key-enter { background: linear-gradient(180deg, #16a34a, #166534); border-top: 1px solid #4ade80; }

        .key-cancel:active { background: #991b1b; }
        .key-clear:active { background: #a16207; }
        .key-enter:active { background: #166534; }

    </style>
</head>
<body>

    <!-- Navigation Overlay -->
    <div class="overlay" id="menu-overlay"></div>

    <!-- Hamburger Button -->
    <div class="hamburger-btn" id="hamburger-btn">
        <div></div><div></div><div></div>
    </div>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
        <div class="menu-title">Select Device</div>
        <div class="menu-item active" data-device="transit">🚇 Transit Terminal</div>
        <div class="menu-item" data-device="eftpos">💳 EFTPOS Machine</div>
    </div>


    <!-- ==========================================
         DEVICE 1: TRANSIT TERMINAL
         ========================================== -->
    <div class="device-container active" id="device-transit">
        <div class="terminal-casing">
            <div class="led-panel">
                <div class="led red" id="transit-led-red"></div>
                <div class="led yellow" id="transit-led-yellow"></div>
                <div class="led green" id="transit-led-green"></div>
            </div>

            <div class="lcd-bezel">
                <div class="lcd-screen">
                    <div id="transit-lcd-text">SYSTEM STANDBY<br>AWAITING INPUT</div>
                </div>
            </div>

            <div class="component-container">
                <div class="pad-label">NFC Sensor</div>
                <div class="scan-pad" id="transit-scan-pad">
                    <div class="js-logo">JS</div>
                </div>
            </div>

            <div class="hardware-divider"></div>

            <div class="component-container">
                <div class="pad-label">Barcode Scanner</div>
                <div class="barcode-window">
                    <button id="transit-btn-barcode" class="barcode-btn">
                        <span>[ OPTICAL ]</span><span>TAP TO WAKE</span>
                    </button>
                    <div id="reader"></div>
                    <button id="transit-btn-stop" class="stop-barcode-btn" aria-label="Power Down Optical">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==========================================
         DEVICE 2: EFTPOS PAYMENT TERMINAL
         ========================================== -->
    <div class="device-container" id="device-eftpos">
        <div class="eftpos-casing" id="eftpos-casing">
            
            <div class="eftpos-nfc-indicator" id="eftpos-nfc-zone">
                <svg class="contactless-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 25,75 Q 45,20 65,75" />
                    <path d="M 15,85 Q 45,5 75,85" />
                    <path d="M 35,65 Q 45,35 55,65" />
                </svg>
            </div>

            <div class="eftpos-screen-bezel">
                <div class="eftpos-screen" id="eftpos-screen-zone">
                    <div class="eftpos-amount" id="eftpos-display-amount">$0.00</div>
                    <div class="eftpos-status" id="eftpos-display-status">ENTER AMOUNT</div>
                </div>
            </div>

            <div class="eftpos-keypad">
                <div class="key-btn" data-key="1">1</div> <div class="key-btn" data-key="2">2</div> <div class="key-btn" data-key="3">3</div>
                <div class="key-btn" data-key="4">4</div> <div class="key-btn" data-key="5">5</div> <div class="key-btn" data-key="6">6</div>
                <div class="key-btn" data-key="7">7</div> <div class="key-btn" data-key="8">8</div> <div class="key-btn" data-key="9">9</div>
                <div class="key-btn key-cancel" data-key="CANCEL">X</div> <div class="key-btn" data-key="0">0</div> <div class="key-btn key-clear" data-key="CLEAR">&lt;</div>
                <div style="grid-column: span 3;" class="key-btn key-enter" data-key="ENTER">ENTER</div>
            </div>

        </div>
    </div>


    <script>
        // --- GLOBAL STATE ---
        let currentDevice = 'transit'; // 'transit' or 'eftpos'
        let audioCtx = null;
        let nfcScannerActive = false;
        let barcodeScannerActive = false;
        let ndefReader = null;
        let html5QrCode = null;
        let resetTimeout = null;

        // --- EFTPOS STATE ---
        let eftposCents = 0; // Stored as cents to handle decimals safely
        let eftposState = 'IDLE'; // IDLE, SCANNING, PROCESSING, RESULT

        // --- DOM ELEMENTS: Menu ---
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('menu-overlay');
        const menuItems = document.querySelectorAll('.menu-item');

        // --- DOM ELEMENTS: Transit ---
        const transitCasing = document.getElementById('device-transit');
        const transitScanPad = document.getElementById('transit-scan-pad');
        const transitLcdText = document.getElementById('transit-lcd-text');
        const transitLedRed = document.getElementById('transit-led-red');
        const transitLedYellow = document.getElementById('transit-led-yellow');
        const transitLedGreen = document.getElementById('transit-led-green');
        const transitBtnBarcode = document.getElementById('transit-btn-barcode');
        const transitBtnStop = document.getElementById('transit-btn-stop');
        const readerDiv = document.getElementById('reader');

        // --- DOM ELEMENTS: EFTPOS ---
        const eftposContainer = document.getElementById('device-eftpos');
        const eftposCasing = document.getElementById('eftpos-casing');
        const eftposNfcZone = document.getElementById('eftpos-nfc-zone');
        const eftposScreenZone = document.getElementById('eftpos-screen-zone');
        const eftposDisplayAmount = document.getElementById('eftpos-display-amount');
        const eftposDisplayStatus = document.getElementById('eftpos-display-status');
        const eftposKeys = document.querySelectorAll('.eftpos-keypad .key-btn');


        // ==========================================
        // UI NAVIGATION & SWITCHING
        // ==========================================

        function toggleMenu() {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        hamburgerBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        menuItems.forEach(item => {
            item.addEventListener('click', (e) => {
                const targetDevice = item.getAttribute('data-device');
                if (targetDevice !== currentDevice) {
                    switchDevice(targetDevice);
                }
                toggleMenu();
            });
        });

        function switchDevice(newDevice) {
            menuItems.forEach(i => i.classList.remove('active'));
            document.querySelector(`[data-device="${newDevice}"]`).classList.add('active');

            if (barcodeScannerActive) stopBarcodeScanner();

            transitCasing.classList.remove('active');
            eftposContainer.classList.remove('active');
            
            if (newDevice === 'transit') transitCasing.classList.add('active');
            else if (newDevice === 'eftpos') eftposContainer.classList.add('active');

            currentDevice = newDevice;
            updateUIForCurrentState();
        }

        function updateUIForCurrentState() {
            clearTimeout(resetTimeout);
            
            if (currentDevice === 'transit') {
                if (nfcScannerActive) {
                    transitScanPad.classList.add('active');
                    transitLcdText.innerHTML = `READY [NFC]<br>PRESENT MEDIA`;
                } else {
                    transitScanPad.classList.remove('active');
                    transitLcdText.innerHTML = "SYSTEM STANDBY<br>AWAITING INPUT";
                }
            } else if (currentDevice === 'eftpos') {
                updateEftposScreen();
            }
        }


        // ==========================================
        // AUDIO ENGINE
        // ==========================================

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(profile) {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;

            if (profile === 'transit-success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(2500, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.6, now + 0.005);
                gain.gain.setValueAtTime(0.6, now + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.11);
            } 
            else if (profile === 'eftpos-success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(1800, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.01);
                gain.gain.setValueAtTime(0.5, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.22);
            }
            else if (profile === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.01);
                gain.gain.setValueAtTime(0.5, now + 0.15);
                gain.gain.linearRampToValueAtTime(0, now + 0.16);
                gain.gain.linearRampToValueAtTime(0.5, now + 0.2);
                gain.gain.setValueAtTime(0.5, now + 0.35);
                gain.gain.linearRampToValueAtTime(0, now + 0.36);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.37);
            }
            else if (profile === 'keypad') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1000, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.05, now + 0.005);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.04);
            }
        }


        // ==========================================
        // EFTPOS STATE MACHINE & LOGIC
        // ==========================================

        function formatMoney(cents) {
            return '$' + (cents / 100).toFixed(2);
        }

        function updateEftposScreen() {
            if (currentDevice !== 'eftpos') return;

            if (eftposState === 'IDLE') {
                eftposDisplayAmount.innerText = formatMoney(eftposCents);
                eftposDisplayStatus.innerText = "ENTER AMOUNT";
                eftposCasing.classList.remove('scanning');
            } else if (eftposState === 'SCANNING') {
                eftposDisplayAmount.innerText = formatMoney(eftposCents);
                eftposDisplayStatus.innerText = "TAP, INSERT OR SWIPE";
                eftposCasing.classList.add('scanning');
            }
        }

        function handleEftposKey(key) {
            initAudio();
            
            // Block input if processing or displaying result
            if (eftposState === 'PROCESSING' || eftposState === 'RESULT') return; 

            if (key >= '0' && key <= '9') {
                if (eftposState === 'SCANNING') return; // Block typing while scanner active
                playBeep('keypad');
                if (eftposCents < 1000000) { // Limit to $9,999.99 max
                    eftposCents = (eftposCents * 10) + parseInt(key);
                    updateEftposScreen();
                }
            } 
            else if (key === 'CLEAR') {
                if (eftposState === 'SCANNING') return;
                playBeep('keypad');
                eftposCents = Math.floor(eftposCents / 10);
                updateEftposScreen();
            } 
            else if (key === 'CANCEL') {
                playBeep('keypad');
                eftposCents = 0;
                eftposState = 'IDLE';
                updateEftposScreen();
            } 
            else if (key === 'ENTER') {
                if (eftposCents > 0 && eftposState === 'IDLE') {
                    playBeep('keypad');
                    eftposState = 'SCANNING';
                    updateEftposScreen();
                    startNFC(); // Wake up scanner
                } else if (eftposCents === 0) {
                    playBeep('error'); // Cannot submit $0.00
                }
            }
        }


        // ==========================================
        // NFC MODULE (Shared)
        // ==========================================

        async function startNFC() {
            if (!("NDEFReader" in window)) {
                // If desktop/no NFC, allow simulated scan below via triggerDeviceSuccess
                return;
            }

            if (nfcScannerActive) return; // Already running

            try {
                if (!ndefReader) ndefReader = new NDEFReader();
                
                if (currentDevice === 'transit') transitLcdText.innerHTML = "INIT NFC...<br>PLEASE WAIT";

                await ndefReader.scan(); 
                nfcScannerActive = true;
                
                // Transit beeps on hardware startup. EFTPOS does not (it just flashes the screen prompt).
                if(currentDevice === 'transit') playBeep('transit-success');
                updateUIForCurrentState();

                ndefReader.onreading = ({ serialNumber }) => { triggerDeviceSuccess(serialNumber); };
                ndefReader.onreadingerror = () => { triggerDeviceError("BAD READ"); };

            } catch (error) {
                if (error.name === 'NotAllowedError') triggerDeviceError("PERMISSION DENIED");
                else triggerDeviceError("SYS FAIL");
            }
        }

        function triggerDeviceSuccess(data) {
            let displayId = data ? data.replace(/:/g, '') : 'UNKNOWN';
            if (navigator.vibrate) navigator.vibrate(50);

            if (currentDevice === 'transit') {
                playBeep('transit-success');
                transitLedGreen.classList.add('on');
                setTimeout(() => transitLedGreen.classList.remove('on'), 1500);
                
                if (displayId.length > 14) displayId = displayId.substring(0, 11) + '...';
                transitLcdText.innerHTML = `ACCEPTED [NFC]<br>${displayId}`;
                scheduleReset(2500);
                
            } else if (currentDevice === 'eftpos') {
                if (eftposState !== 'SCANNING') return; // Ignore random NFC taps if not ready
                
                eftposState = 'PROCESSING';
                eftposDisplayStatus.innerText = "PROCESSING...";
                eftposDisplayAmount.innerText = "";
                eftposCasing.classList.remove('scanning');
                
                // Simulate network delay
                setTimeout(() => {
                    playBeep('eftpos-success');
                    eftposState = 'RESULT';
                    eftposDisplayStatus.innerText = "APPROVED";
                    eftposDisplayAmount.innerText = formatMoney(eftposCents);
                    
                    setTimeout(() => {
                        if (currentDevice === 'eftpos') {
                            eftposState = 'IDLE';
                            eftposCents = 0;
                            updateEftposScreen();
                        }
                    }, 3000); // Back to $0.00 after 3 seconds
                }, 1200);
            }
        }

        function triggerDeviceError(msg) {
            playBeep('error');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            if (currentDevice === 'transit') {
                transitLedRed.classList.add('on');
                setTimeout(() => transitLedRed.classList.remove('on'), 2000);
                transitLcdText.innerHTML = `SCAN ERROR<br>${msg}`;
                scheduleReset(3000);
            } else if (currentDevice === 'eftpos') {
                if (eftposState !== 'SCANNING') return;
                eftposState = 'RESULT';
                eftposCasing.classList.remove('scanning');
                eftposDisplayStatus.innerText = "DECLINED";
                eftposDisplayAmount.innerText = "ERROR";
                
                setTimeout(() => {
                    if (currentDevice === 'eftpos') {
                        eftposState = 'IDLE';
                        eftposCents = 0;
                        updateEftposScreen();
                    }
                }, 3000);
            }
        }

        function scheduleReset(delay) {
            clearTimeout(resetTimeout);
            resetTimeout = setTimeout(() => { updateUIForCurrentState(); }, delay);
        }


        // ==========================================
        // BARCODE MODULE (Transit Only)
        // ==========================================

        function startBarcodeScanner() {
            transitLcdText.innerHTML = "INIT CAMERA...<br>PLEASE WAIT";
            transitBtnBarcode.style.display = 'none';
            readerDiv.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 130 } },
                (decodedText) => {
                    if (currentDevice === 'transit') {
                        playBeep('transit-success');
                        if (navigator.vibrate) navigator.vibrate(50);
                        transitLedGreen.classList.add('on');
                        setTimeout(() => transitLedGreen.classList.remove('on'), 1500);
                        
                        let displayId = decodedText ? decodedText.replace(/:/g, '') : 'UNKNOWN';
                        if (displayId.length > 14) displayId = displayId.substring(0, 11) + '...';
                        transitLcdText.innerHTML = `ACCEPTED [OPT]<br>${displayId}`;
                        scheduleReset(2500);
                    }
                    html5QrCode.pause(true);
                    setTimeout(() => {
                        if(html5QrCode && html5QrCode.getState() === 2) { 
                            html5QrCode.resume();
                            updateUIForCurrentState();
                        }
                    }, 2500);
                },
                (errorMessage) => { /* ignore */ }
            ).then(() => {
                barcodeScannerActive = true;
                transitBtnStop.style.display = 'flex';
                playBeep('transit-success');
                transitLedGreen.classList.add('on');
                setTimeout(() => transitLedGreen.classList.remove('on'), 300);
                updateUIForCurrentState();
            }).catch((err) => {
                triggerDeviceError("CAM SYS FAIL");
                resetBarcodeUI();
            });
        }

        function stopBarcodeScanner() {
            if (html5QrCode && barcodeScannerActive) {
                transitLcdText.innerHTML = "POWERING DOWN<br>OPTICS...";
                html5QrCode.stop().then(() => { html5QrCode.clear(); resetBarcodeUI(); }).catch(() => { resetBarcodeUI(); });
            }
        }

        function resetBarcodeUI() {
            barcodeScannerActive = false;
            transitBtnBarcode.style.display = 'flex';
            readerDiv.style.display = 'none';
            transitBtnStop.style.display = 'none';
            updateUIForCurrentState();
        }


        // ==========================================
        // EVENT LISTENERS
        // ==========================================

        const handleManualSimulate = (e) => {
            if (e.type === 'touchstart') e.preventDefault();
            initAudio();
            if (currentDevice === 'transit') {
                if (!nfcScannerActive) startNFC();
                else triggerDeviceSuccess('TEST-MANUAL'); // Desktop simulation
            } else if (currentDevice === 'eftpos') {
                if (eftposState === 'SCANNING') triggerDeviceSuccess('TEST-MANUAL');
            }
        };

        // Transit Interactions
        transitScanPad.addEventListener('mousedown', handleManualSimulate);
        transitScanPad.addEventListener('touchstart', handleManualSimulate, { passive: false });

        transitBtnBarcode.addEventListener('mousedown', (e) => { if (e.type === 'touchstart') e.preventDefault(); initAudio(); startBarcodeScanner(); });
        transitBtnBarcode.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); startBarcodeScanner(); }, { passive: false });
        transitBtnStop.addEventListener('mousedown', (e) => { if (e.type === 'touchstart') e.preventDefault(); stopBarcodeScanner(); });
        transitBtnStop.addEventListener('touchstart', (e) => { e.preventDefault(); stopBarcodeScanner(); }, { passive: false });

        // EFTPOS Screen/NFC Simulation Zone
        eftposNfcZone.addEventListener('mousedown', handleManualSimulate);
        eftposNfcZone.addEventListener('touchstart', handleManualSimulate, { passive: false });
        eftposScreenZone.addEventListener('mousedown', handleManualSimulate);
        eftposScreenZone.addEventListener('touchstart', handleManualSimulate, { passive: false });

        // EFTPOS Keypad Binding
        eftposKeys.forEach(btn => {
            const key = btn.getAttribute('data-key');
            const handleKeypress = (e) => {
                if (e.type === 'touchstart') e.preventDefault();
                handleEftposKey(key);
            };
            btn.addEventListener('mousedown', handleKeypress);
            btn.addEventListener('touchstart', handleKeypress, { passive: false });
        });

    </script>
</body>
</html>
