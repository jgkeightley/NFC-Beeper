<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Beep Reader</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #beep-btn {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: none;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #c00000);
            box-shadow: 
                0 15px 0 #800000, 
                0 15px 25px rgba(0,0,0,0.6),
                inset 0 5px 15px rgba(255,255,255,0.4);
            color: rgba(255, 255, 255, 0.95);
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.08s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.08s, filter 0.3s; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* Active state (when pressed manually) */
        #beep-btn:active, #beep-btn.pressed {
            transform: translateY(12px);
            box-shadow: 
                0 3px 0 #800000, 
                0 3px 10px rgba(0,0,0,0.5),
                inset 0 5px 20px rgba(0,0,0,0.3);
            background: radial-gradient(circle at 30% 30%, #ff3333, #a00000);
        }

        /* Scanning state (NFC active) */
        #beep-btn.scanning {
            filter: drop-shadow(0 0 20px rgba(255, 77, 77, 0.6));
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { filter: drop-shadow(0 0 10px rgba(255, 77, 77, 0.4)); }
            to { filter: drop-shadow(0 0 35px rgba(255, 77, 77, 0.9)); }
        }

        #status-text {
            color: #888;
            margin-top: 40px;
            font-size: 1.1rem;
            text-align: center;
            max-width: 80%;
            height: 2.5em;
        }

        .success-text { color: #4CAF50 !important; }
        .error-text { color: #ff5252 !important; }

        /* Success flash effect */
        @keyframes flash {
            0% { background-color: rgba(255, 255, 255, 0); }
            50% { background-color: rgba(255, 255, 255, 0.15); }
            100% { background-color: rgba(255, 255, 255, 0); }
        }

        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <button id="beep-btn">BEEP</button>
    <p id="status-text">Press button to enable NFC scanner</p>
    
    <div id="flash-overlay" class="flash-overlay"></div>

    <script>
        const btn = document.getElementById('beep-btn');
        const flashOverlay = document.getElementById('flash-overlay');
        const statusText = document.getElementById('status-text');
        let audioCtx = null;
        let nfcScannerActive = false;

        // --- Audio System ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playNfcBeep() {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(2500, audioCtx.currentTime); 
            
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.6, now + 0.005);
            gainNode.gain.setValueAtTime(0.6, now + 0.08);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(now);
            oscillator.stop(now + 0.11);
        }

        function triggerVisuals() {
            flashOverlay.style.animation = 'none';
            flashOverlay.offsetHeight; 
            flashOverlay.style.animation = 'flash 0.15s ease-out';
            
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function successAction() {
            playNfcBeep();
            triggerVisuals();
            
            btn.classList.add('pressed');
            setTimeout(() => btn.classList.remove('pressed'), 150);
        }

        // --- NFC System ---
        async function startNFC() {
            if (!("NDEFReader" in window)) {
                statusText.textContent = "NFC is not supported on this browser/device.";
                statusText.className = "error-text";
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan(); 
                
                nfcScannerActive = true;
                btn.classList.add('scanning');
                statusText.innerHTML = "Scanner Active.<br>Tap an NFC card to the back of your phone.";
                statusText.className = "success-text";

                ndef.addEventListener("reading", ({ message, serialNumber }) => {
                    successAction();
                    statusText.innerHTML = `Card Read Successfully!<br>ID: ${serialNumber || 'Hidden'}`;
                    
                    setTimeout(() => {
                        if (nfcScannerActive) {
                            statusText.innerHTML = "Scanner Active.<br>Tap an NFC card to the back of your phone.";
                        }
                    }, 2000);
                });

                ndef.addEventListener("readingerror", () => {
                    statusText.textContent = "Read error. Try tapping again.";
                    statusText.className = "error-text";
                    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                });

            } catch (error) {
                console.error("NFC Error:", error);
                statusText.textContent = `NFC Error: ${error.message}`;
                statusText.className = "error-text";
            }
        }

        // --- User Interaction ---
        function handleInteraction(e) {
            if (e.type === 'touchstart') {
                e.preventDefault();
            }
            
            successAction();
            
            if (!nfcScannerActive) {
                statusText.textContent = "Requesting NFC permissions...";
                startNFC();
            }
        }

        btn.addEventListener('mousedown', handleInteraction);
        btn.addEventListener('touchstart', handleInteraction, { passive: false });
        
    </script>
</body>
</html>
